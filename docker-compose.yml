version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: athletics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your-password-here}
      POSTGRES_DB: ${DB_NAME:-athletics}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-athletics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - athletics_network

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: athletics-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - athletics_network
    command: redis-server --appendonly yes

  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athletics-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_ENGINE: postgresql+psycopg2
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-your-password-here}
      DB_NAME: ${DB_NAME:-athletics}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: "false"
      ENVIRONMENT: "production"
    networks:
      - athletics_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: athletics-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - athletics_network

volumes:
  postgres_data:
  redis_data:

networks:
  athletics_network:
    driver: bridge
