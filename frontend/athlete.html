<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>运动员面板 · 校级田径队管理平台</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header>
      <div>
        <strong>校级田径队 · 运动员面板</strong>
      </div>
      <button id="logoutBtn" class="btn btn-outline">退出登录</button>
    </header>
    <main class="container">
      <div class="card" data-countdown>
        <h2>最近赛事倒计时</h2>
        <p data-event-name>加载中...</p>
        <p data-event-time></p>
        <div class="countdown-timer" data-event-countdown>--</div>
      </div>
      <div class="flex">
        <div class="card" id="profileCard">
          <h2>个人信息</h2>
          <p>加载中...</p>
        </div>
        <div class="card" style="flex:1;">
          <h2>快捷导航</h2>
          <p class="muted">快速跳转至常用功能</p>
          <div class="stats-grid">
            <a class="stat-card" href="#attendanceSection">考勤记录</a>
            <a class="stat-card" href="#scoreSection">成绩趋势</a>
            <a class="stat-card" href="#rankingSection">项目排行榜</a>
            <a class="stat-card" href="#settingsSection">账号设置</a>
          </div>
        </div>
        <div class="card" id="settingsSection" style="flex:1;">
          <h2>修改密码</h2>
          <form id="passwordForm">
            <input type="password" name="oldPassword" placeholder="当前密码" />
            <input type="password" name="newPassword" placeholder="新密码" />
            <button class="btn btn-primary" type="submit">更新密码</button>
          </form>
          <div id="passwordMessage"></div>
        </div>
      </div>

      <div class="card" id="attendanceSection">
        <h2>考勤记录</h2>
        <form id="attendanceFilter" class="flex" style="gap:1rem; align-items:flex-end;">
          <div>
            <label>开始日期</label>
            <input type="date" name="startDate" />
          </div>
          <div>
            <label>结束日期</label>
            <input type="date" name="endDate" />
          </div>
          <div>
            <button class="btn btn-outline" type="submit">筛选</button>
          </div>
        </form>
        <div style="overflow-x:auto;">
          <table class="table" id="attendanceTable">
            <thead>
              <tr>
                <th>时间</th>
                <th>场次</th>
                <th>状态</th>
                <th>方式</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="5">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="flex" id="scoreSection">
        <div class="card" style="flex:2;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <h2>成绩趋势</h2>
            <select id="trendEventSelect"></select>
          </div>
          <canvas id="scoreTrendChart" height="200"></canvas>
        </div>
        <div class="card" style="flex:1;">
          <h2>近期成绩</h2>
          <ul id="scoreList"></ul>
        </div>
      </div>

      <div class="card" id="rankingSection">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h2>项目排行榜</h2>
          <select id="rankingEventSelect"></select>
        </div>
        <ol id="rankingList"></ol>
      </div>

      <div class="card">
        <h2>教练评分</h2>
        <ul id="ratingList"></ul>
      </div>
    </main>
    <script src="/static/js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/athlete.js"></script>
  </body>
</html>
